<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Globe</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  html,body{margin:0;padding:0;height:100%;background:transparent;overflow:hidden;}

  .globe-host{
    position:relative;
    width:100%;height:100%;
    display:flex;align-items:center;justify-content:center;
    background:transparent;
  }

  /* ----- BLUE GLOW (edit this block to tweak the glow) ----- */
  :root{ --blue:#95B8F8; }

  .globe-host::before{
    content:"";
    position:absolute;
    width:min(70vmin,520px); height:min(70vmin,520px);
    border-radius:50%;
    background: radial-gradient(circle at center,
      color-mix(in oklab, var(--blue) 40%, transparent) 0%,
      color-mix(in oklab, var(--blue) 12%, transparent) 38%,
      transparent 72%);
    filter: blur(44px);
    pointer-events:none;
  }
  /* --------------------------------------------------------- */

  canvas#globe{
    position:relative;
    width:min(80vmin,600px);height:min(80vmin,600px);
    display:block;
    background:transparent;
  }
</style>
</head>
<body>

<div class="globe-host">
  <canvas id="globe"></canvas>
</div>

<!-- Three.js (CDN) -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<!-- Globe renderer -->
<script>
/* ==========================================================================
   Stylised wireframe globe — transparent, with CSS glow behind it.
   Color: reads --blue CSS var on :root (fallback #95B8F8).
   ========================================================================== */
(function(){
  const canvas = document.getElementById('globe');
  if(!canvas || !window.THREE) return;

  const getBlue = () => (
    getComputedStyle(document.documentElement)
      .getPropertyValue('--blue').trim() || '#95B8F8'
  );

  // ---------- three.js scaffold --------------------------------------------
  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
  camera.position.z = 3.2;

  const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);   // fully transparent clear

  function resize(){
    const r = canvas.getBoundingClientRect();
    const s = Math.max(1, Math.min(r.width, r.height));
    renderer.setSize(s, s, false);
  }
  resize();
  new ResizeObserver(resize).observe(canvas);

  const group = new THREE.Group();
  scene.add(group);

  const color = new THREE.Color(getBlue());

  // ---------- 1. Lat/lon graticule -----------------------------------------
  const R   = 1;
  const LAT = 14;    // number of parallels
  const LON = 22;    // number of meridians
  const SEG = 96;    // resolution per line

  const matLat = new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.55 });
  const matLon = new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.35 });
  const matEq  = new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.90 });

  for(let i=1;i<LAT;i++){
    const phi = Math.PI * i / LAT;
    const y = Math.cos(phi) * R;
    const r = Math.sin(phi) * R;
    const pts = [];
    for(let j=0;j<=SEG;j++){
      const t = (j/SEG) * Math.PI * 2;
      pts.push(new THREE.Vector3(Math.cos(t)*r, y, Math.sin(t)*r));
    }
    const mat = (i === LAT/2) ? matEq : matLat;
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
  }

  for(let i=0;i<LON;i++){
    const th = (i/LON) * Math.PI * 2;
    const pts = [];
    for(let j=0;j<=SEG;j++){
      const phi = (j/SEG) * Math.PI;
      pts.push(new THREE.Vector3(
        Math.sin(phi) * Math.cos(th) * R,
        Math.cos(phi) * R,
        Math.sin(phi) * Math.sin(th) * R
      ));
    }
    group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), matLon));
  }

  // ---------- 2. Density-masked dots ---------------------------------------
  // Fibonacci-distributed candidates, filtered by a noise-ish function so
  // the density varies across the sphere (hints at landmasses without drawing
  // a real map).
  const dotCount  = 900;
  const candidates = 2400;
  const dotPos    = new Float32Array(dotCount * 3);

  const landmass = (lat, lon) => {
    const f1 = Math.sin(lat*2 + 0.5) * Math.cos(lon*1.3);
    const f2 = Math.sin(lat*3 - 1.2) * Math.sin(lon*2.1 + 0.7);
    const f3 = Math.cos(lat*1.6 + 0.9) * Math.cos(lon*0.9 - 0.4);
    return f1 + f2*0.6 + f3*0.5;
  };

  let idx = 0;
  const phi0 = Math.PI * (3 - Math.sqrt(5));
  for(let i=0;i<candidates && idx<dotCount;i++){
    const y = 1 - (i / (candidates - 1)) * 2;
    const r = Math.sqrt(1 - y*y);
    const theta = phi0 * i;
    const x = Math.cos(theta) * r;
    const z = Math.sin(theta) * r;
    const lat = Math.asin(y);
    const lon = Math.atan2(z, x);
    const v = landmass(lat, lon);
    if(v > 0.25 + (Math.random() - 0.5) * 0.2){
      dotPos[idx*3+0] = x * 1.005;
      dotPos[idx*3+1] = y * 1.005;
      dotPos[idx*3+2] = z * 1.005;
      idx++;
    }
  }

  const dotGeom = new THREE.BufferGeometry();
  dotGeom.setAttribute('position', new THREE.BufferAttribute(dotPos.slice(0, idx*3), 3));
  const dotMat = new THREE.PointsMaterial({
    color, size:0.018, sizeAttenuation:true, transparent:true, opacity:0.95
  });
  group.add(new THREE.Points(dotGeom, dotMat));

  // ---------- 3. Axial tilt (~23.5°) ---------------------------------------
  group.rotation.z = -0.41;

  // ---------- 4. Animate ---------------------------------------------------
  let last = performance.now();
  function tick(now){
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;

    group.rotation.y += dt * 0.18;

    // Live color sync — pick up any change to --blue on :root.
    const c = new THREE.Color(getBlue());
    matLat.color.copy(c);
    matLon.color.copy(c);
    matEq.color.copy(c);
    dotMat.color.copy(c);

    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
})();
</script>

</body>
</html>
